name: Build ImmortalWrt MT798x

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Device config file'
        required: true
        default: 'h3c_nx30pro'
        type: choice
        options:
          - h3c_nx30pro

env:
  REPO_URL: https://github.com/hanwckf/immortalwrt-mt798x.git
  REPO_BRANCH: openwrt-21.02
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -hT
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/node /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby /usr/local/graalvm \
            /usr/local/share/chromium /usr/local/share/powershell
          sudo docker image prune --all --force
          sudo apt-get -qq autoremove --purge
          sudo apt-get -qq clean
          echo "After cleanup:"
          df -hT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils python3-setuptools rsync swig unzip zlib1g-dev \
            file wget libelf-dev

      - name: Clone source code
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          ln -sf /home/runner/work/_temp/_github_workflow openwrt/

      - name: Apply custom feeds
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config
        run: |
          cp configs/${{ github.event.inputs.config }}.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8 V=s
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "Started: $(date)"
          make -j$(nproc) 2>&1 | tee build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          if [ $MAKE_EXIT -ne 0 ]; then
            echo "::error::Multi-thread build failed (exit $MAKE_EXIT). Retrying single-thread with verbose..."
            echo "========== TAIL OF FAILED BUILD LOG ==========" 
            tail -100 build.log
            echo "==============================================="
            make -j1 V=s 2>&1 | tee build_j1.log
            MAKE_EXIT=${PIPESTATUS[0]}
          fi
          echo "Finished: $(date)"
          if [ $MAKE_EXIT -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "::error::Build failed!"
            tail -200 build_j1.log
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            openwrt/build.log
            openwrt/build_j1.log

      - name: Check disk space
        if: steps.compile.outputs.status == 'success'
        run: |
          df -hT
          echo "===== Firmware output ====="
          ls -lh openwrt/bin/targets/mediatek/mt7981/ || echo "Target directory not found"
          echo "===== Looking for .bin files ====="
          find openwrt/bin/targets/ -name "*.bin" -o -name "*.img" 2>/dev/null || true

      - name: Organize files
        if: steps.compile.outputs.status == 'success'
        id: organize
        run: |
          cd openwrt/bin/targets/mediatek/mt7981
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "RELEASE_TAG=$(date +"%Y%m%d-%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware as artifact
        if: steps.organize.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-mt798x-${{ github.event.inputs.config }}-${{ env.RELEASE_TAG }}
          path: ${{ env.FIRMWARE_PATH }}

      - name: Create release
        if: steps.organize.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ImmortalWrt MT798x ${{ github.event.inputs.config }} ${{ env.RELEASE_TAG }}
          body: |
            ## ImmortalWrt MT798x 自动编译固件

            - 设备: ${{ github.event.inputs.config }}
            - 编译时间: ${{ env.RELEASE_TAG }}
            - 源码: hanwckf/immortalwrt-mt798x (${{ env.REPO_BRANCH }})
            - Passwall: Anikato/openwrt-passwall (含 iptables-mod-socket 修复)
          files: ${{ env.FIRMWARE_PATH }}/*
